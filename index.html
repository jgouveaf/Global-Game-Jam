<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp - Farming Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="ui-overlay">
        <header>
            <div class="logo">Agri<span>Corp</span></div>
            <div class="stats">
                <div class="stat">🪙 <span id="money">1000</span></div>
                <div class="stat">📆 Dia <span id="day">1</span></div>
            </div>
        </header>

        <div id="sidebar">
            <div class="tool-btn active" data-tool="select">✋ Mover</div>
            <div class="tool-btn" data-tool="till">🚜 Arar</div>
            <div class="tool-btn" data-tool="plant">🌱 Plantar</div>
            <div class="tool-btn" data-tool="water">💧 Regar</div>
        </div>

        <div id="inventory-hotbar">
            <!-- Slots serão gerados via JS -->
        </div>

        <div id="active-upgrades">
            <!-- Upgrades ativos aparecerão aqui -->
        </div>

        <div id="game-container">
            <canvas id="game-canvas"></canvas>
            <div id="cursor-info"></div>
        </div>

        <footer>
            <p>1-0 para selecionar itens | WASD para mover</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>

</html>
