<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #325e22; overflow: hidden;">

    <!-- HUD Superior (Transparente e flutuante) -->
    <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; align-items: center; gap: 10px; width: 80%; pointer-events: none;">
        <span style="color: #fff; text-shadow: 2px 2px #000; font-size: 10px; font-family: 'Press Start 2P';">COMUNIDADE</span>
        <div style="flex: 1; height: 16px; background: rgba(0,0,0,0.4); border: 2px solid #fff; position: relative;">
            <div id="hp-bar" style="height: 100%; background: #f00; width: 100%;"></div>
        </div>
        <span id="hud-value" style="color: #fff; text-shadow: 2px 2px #000; font-size: 10px;">100</span>
    </div>

    <!-- MOEDAS E SEMENTES -->
    <div id="stats-container" style="position: fixed; top: 60px; left: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; font-family: 'Press Start 2P'; font-size: 10px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none;">
        <div style="color: #ffd700;">💰 MOEDAS: <span id="hud-coins-value">100</span></div>
        <div style="color: #0f0;">🌱 SEMENTES: <span id="hud-seeds-value">10</span></div>
    </div>

    <!-- TIMER -->
    <div id="planting-timer" class="hidden" style="position: fixed; top: 100px; left: 50%; transform: translateX(-50%); color: #fff; text-shadow: 2px 2px #000; font-size: 14px; z-index: 10000; font-family: 'Press Start 2P';">
        PLANTARE: <span id="timer-sec">10</span>s
    </div>

    <!-- Botões de Ação Final -->
    <div id="action-buttons" style="position: fixed; bottom: 30px; right: 30px; z-index: 11000; display: flex; flex-direction: column; gap: 15px;">
        <button id="btn-water" style="padding: 15px; background: #2980b9; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;">💧 REGAR TERRENO</button>
        <button id="btn-open-shop" style="padding: 15px; background: #d35400; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer;">🏪 IR PRA LOJA</button>
    </div>

    <!-- OVERLAY DA LOJA (O Negócio Preto agora é opaco e bonito) -->
    <div id="shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P';">
        <h2 style="margin-bottom: 20px; color: #ffd700;">LOJA DA VILA</h2>
        <div style="background: #2c3e50; border: 5px solid #fff; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <div style="font-size: 50px;">🌱</div>
            <h3>SEMENTE TRIGO</h3>
            <div style="color: #ffd700; font-size: 12px;">💰 10 CADA</div>
            <button id="btn-buy-seed" style="background: #27ae60; color: white; padding: 15px; width: 100%; border: 3px solid #fff; font-family: 'Press Start 2P'; cursor: pointer;">COMPRAR (1)</button>
        </div>
        <button id="btn-close-shop" style="margin-top: 30px; background: #c0392b; color: #fff; border: 3px solid #fff; padding: 10px; cursor: pointer; font-family: 'Press Start 2P';">FECHAR LOJA</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
