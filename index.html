<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp - 2D Farming Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Force visibility for debugging */
        #splash-screen { display: none !important; }
        #start-menu { display: flex !important; z-index: 1000; }
        #game-ui { z-index: 1; }
        .menu-option { pointer-events: auto !important; cursor: pointer !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Start Menu -->
        <div id="start-menu">
            <h1 class="main-title">AgriCorp</h1>
            <div class="menu-options">
                <button class="menu-option" data-action="play" style="padding: 20px 40px; font-family: inherit; font-size: 24px; background: #ffaa00; border: 4px solid #fff; cursor: pointer;">PLAY GAME</button>
            </div>
        </div>
        
        <!-- Game Canvas -->
        <div id="game-ui" style="display: none;">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
