<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #000; overflow: hidden;">

    <!-- HUD Superior (Barra Vermelha) -->
    <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 3px solid #fff; width: 70%;">
        <span style="color: #fff; font-size: 10px; font-family: 'Press Start 2P', cursive;">COMUNIDADE</span>
        <div style="flex: 1; height: 18px; background: #333; border: 2px solid #555; position: relative;">
            <div id="hp-bar" style="height: 100%; background: #f00 !important; width: 100%;"></div>
        </div>
        <span id="hud-value" style="color: #fff; font-size: 10px; font-family: 'Press Start 2P', cursive;">100</span>
    </div>

    <!-- TIMER DE PLANTIO -->
    <div id="planting-timer" class="hidden">
        PREPARE-SE: <span id="timer-sec">10</span>s PARA PLANTAR!
    </div>

    <!-- Botões de Ação -->
    <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px;">
        <button id="btn-water">💧 REGAR</button>
        <button id="btn-open-inventory" onclick="document.getElementById('inventory-overlay').classList.remove('hidden')">🎒 INVENTÁRIO</button>
        <button id="btn-open-shop" onclick="document.getElementById('shop-overlay').classList.remove('hidden')">🏪 LOJA</button>
    </div>

    <!-- Overlays -->
    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: #fff; padding: 50px; font-family: 'Press Start 2P';">
        <h2>🎒 MEU INVENTÁRIO</h2>
        <p>Vazio por enquanto...</p>
        <button onclick="document.getElementById('inventory-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <div id="shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: #fff; padding: 50px; font-family: 'Press Start 2P';">
        <h2>🏪 LOJA DA VILA</h2>
        <p>Sem itens no momento...</p>
        <button onclick="document.getElementById('shop-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <!-- CARREGAR GAME.JS -->
    <script src="game.js"></script>
</body>
</html>
