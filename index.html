<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { font-size: 8px !important; }
        .pixel-icon { width: 16px; image-rendering: pixelated; vertical-align: middle; }
        .menu-btn { background: #8b4513; border: 4px solid #fff; border-bottom: 6px solid #5d3a1a; color: #fff; padding: 10px 20px; font-family: 'Press Start 2P'; cursor: pointer; margin: 10px; font-size: 10px !important; }
        .back-pixel-btn { background: #3498db; border: 3px solid #fff; border-bottom: 5px solid #2980b9; color: #fff; padding: 8px 16px; font-family: 'Press Start 2P'; cursor: pointer; }
        .sell-btn-large { background: #27ae60; border: 4px solid #fff; border-bottom: 6px solid #1e8449; color: #fff; padding: 15px 30px; font-family: 'Press Start 2P'; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #000; overflow: hidden;">

    <!-- MAIN MENU OVERLAY (Clean style) -->
    <div id="menu-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: url('sprites/Menu.png'); background-size: cover; background-position: center;">
        <div style="margin-top: 50px;">
            <button id="btn-play" class="menu-btn">▶ START MISSION</button>
            <br>
            <button id="btn-exit" class="menu-btn" style="background: #c0392b; border-bottom-color: #7b241c;">✖ EXIT</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="game-ui" class="hidden">
        <div id="stats-container" style="position: fixed; top: 60px; left: 20px; z-index: 5000; font-family: 'Press Start 2P'; color: #fff; text-shadow: 2px 2px #000; pointer-events: none;">
            <div style="color: #ffd700; margin-bottom: 8px; font-size: 10px !important;"><img src="sprites/Moeda.png" style="width:16px;"> <span id="hud-coins-value">500</span></div>
            <div style="color: #ffffff; opacity: 0.9;">📦 STOCK: <span id="hud-products-value">0</span></div>
        </div>
        <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; gap: 10px; width: 50%; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid #fff;">
            <span style="color: #fff; font-family: 'Press Start 2P';">NEED</span>
            <div style="flex: 1; height: 12px; background: #000; border: 1px solid #555; position: relative;">
                <div id="hp-bar" style="height: 100%; background: #f1c40f; width: 100%; transition: width 0.3s ease;"></div>
            </div>
            <span id="hud-value" style="color: #fff; font-family: 'Press Start 2P';">100</span>
        </div>
        <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 7000; display: flex; flex-direction: column; gap: 8px;">
            <button id="btn-open-lots" style="background: #e67e22; border-color: #ffd700; border-bottom: 6px solid #d35400;">🚜 LAND</button>
            <button id="btn-open-animals" style="background: #3498db; border-color: #fff; border-bottom: 6px solid #2980b9;">🐾 ANIMALS</button>
            <button id="btn-open-inventory" style="background: #8b4513; border-bottom: 6px solid #5d3a1a;">🎒 STORAGE</button>
            <button id="btn-open-tutorial" style="background: #444; border-color: #888;">❓ HOW TO PLAY</button>
        </div>
    </div>

    <!-- Storage Overlay -->
    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; color: #fff; padding: 40px; font-family: 'Press Start 2P'; text-align: center;">
        <h2 style="color: #ffd700; margin-bottom: 20px;">🎒 WAREHOUSE</h2>
        <div id="inv-crops-list" style="max-width: 500px; margin: 0 auto; line-height: 2; text-align: left;"></div>
        <button id="btn-sell-manual" class="sell-btn-large">💰 SELL ALL PRODUCE</button>
        <br><br>
        <button id="btn-inv-voltar" class="back-pixel-btn">BACK</button>
    </div>

    <!-- Tutorial Overlay -->
    <div id="tutorial-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 35000; display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P'; color: #fff; padding: 20px;">
        <div style="max-width: 450px; border: 2px solid #ffd700; background: #1a1a1a; padding: 30px; text-align: left;">
            <h2 style="color: #ffd700; margin-bottom: 15px;">HOW TO PLAY</h2>
            <p>1. Expand lands to produce crops.</p>
            <p>2. Buy animals to produce eggs/meat/milk.</p>
            <p>3. Go to STORAGE and SELL often to get coins and maintain community trust.</p>
            <p style="color: #f00;">4. THE BAR ALWAYS FALLS! Sell more to survive.</p>
            <button id="btn-close-tut" class="back-pixel-btn" style="margin-top:20px;">LET'S GO!</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>

</body>
</html>
