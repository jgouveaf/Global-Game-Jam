<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HUD: Linha 1 – Barra de Comunidade -->
    <div id="hud-top">
        <span id="hud-label">COMUNIDADE</span>
        <div id="hp-bar-bg">
            <div id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hud-value">100</span>
    </div>

    <!-- HUD: Linha 2 – Moedas -->
    <div id="hud-coins">
        <canvas id="coin-icon" width="36" height="36"></canvas>
        <span id="hud-coins-label">MOEDAS:</span>
        <span id="hud-coins-value">0</span>
    </div>

    <!-- Modal de Confirmação da Loja -->
    <div id="shop-confirm" class="hidden">
        <p>Abrir Loja?</p>
        <div class="modal-buttons">
            <button id="btn-shop-sim">SIM</button>
            <button id="btn-shop-nao">NÃO</button>
        </div>
    </div>

    <!-- Overlay da Loja -->
    <div id="shop-overlay" class="hidden">
        <h2>LOJA DA FAZENDA</h2>
        <div class="shop-cards">
            <div class="shop-card">
                <h3>VELOCIDADE</h3>
                <p>Plantação</p>
                <div class="stars">★★★★☆☆</div>
                <button class="buy-btn">UPGRADE</button>
            </div>
            <div class="shop-card">
                <h3>NOVO LOTE</h3>
                <p>Expansão</p>
                <div class="stars">★★☆☆☆☆</div>
                <button class="buy-btn">COMPRAR</button>
            </div>
            <div class="shop-card">
                <h3>ANIMAIS</h3>
                <p>Novos Amigos</p>
                <div class="stars">☆☆☆☆☆☆</div>
                <button class="buy-btn">COMPRAR</button>
            </div>
        </div>
        <button id="btn-shop-voltar">VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
