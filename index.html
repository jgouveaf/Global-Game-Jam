<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- HUD: Barra de Comunidade -->
    <div id="hud-top">
        <span id="hud-label">COMUNIDADE</span>
        <div id="hp-bar-bg">
            <div id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hud-value">100</span>
    </div>

    <!-- HUD: Moedas -->
    <div id="hud-coins">
        <span id="hud-coins-label">MOEDAS:</span>
        <span id="hud-coins-value">0</span>
    </div>

    <!-- INVENTÁRIO (HOTBAR DE 10 SLOTS) -->
    <div id="hotbar-container">
        <div class="hotbar-slot active" data-slot="1"><span class="slot-num">1</span></div>
        <div class="hotbar-slot" data-slot="2"><span class="slot-num">2</span></div>
        <div class="hotbar-slot" data-slot="3"><span class="slot-num">3</span></div>
        <div class="hotbar-slot" data-slot="4"><span class="slot-num">4</span></div>
        <div class="hotbar-slot" data-slot="5"><span class="slot-num">5</span></div>
        <div class="hotbar-slot" data-slot="6"><span class="slot-num">6</span></div>
        <div class="hotbar-slot" data-slot="7"><span class="slot-num">7</span></div>
        <div class="hotbar-slot" data-slot="8"><span class="slot-num">8</span></div>
        <div class="hotbar-slot" data-slot="9"><span class="slot-num">9</span></div>
        <div class="hotbar-slot" data-slot="10"><span class="slot-num">0</span></div>
    </div>

    <!-- TIMER DE PLANTIO -->
    <div id="planting-timer" class="hidden">
        PREPARE-SE: <span id="timer-sec">10</span>s PARA PLANTAR!
    </div>

    <!-- Botões de Ação (Canto Inferior Direito) -->
    <div id="action-buttons">
        <button id="btn-water">💧 REGAR</button>
        <button id="btn-open-inventory" onclick="document.getElementById('inventory-overlay').classList.remove('hidden')">
            🎒 INVENTÁRIO
        </button>
        <button id="btn-open-shop" onclick="document.getElementById('shop-overlay').classList.remove('hidden')">
            🏪 LOJA
        </button>
    </div>

    <!-- Overlay da Loja -->
    <div id="shop-overlay" class="hidden">
        <h2>🏪 LOJA DA FAZENDA</h2>
        <div class="shop-cards">
            <div class="shop-card">
                <div class="card-icon">🐖</div>
                <h3>NOVOS<br>ANIMAIS</h3>
                <p>Porcos e Galinhas</p>
                <div class="stars">☆☆☆☆☆☆</div>
                <div class="card-price">💰 500</div>
                <button class="buy-btn">COMPRAR</button>
            </div>
            <div class="shop-card">
                <div class="card-icon">🌱</div>
                <h3>NOVAS<br>PLANTAS</h3>
                <p>Girassol e Milho</p>
                <div class="stars">☆☆☆☆☆☆</div>
                <div class="card-price">💰 300</div>
                <button class="buy-btn">COMPRAR</button>
            </div>
            <div class="shop-card card-highlight">
                <div class="card-icon">⚡</div>
                <h3>VELOCIDADE<br>PLANTIO</h3>
                <p>Mais agilidade</p>
                <div class="stars">☆☆☆☆☆☆</div>
                <div class="card-price">💰 800</div>
                <button class="buy-btn">COMPRAR</button>
            </div>
        </div>
        <button id="btn-shop-voltar" onclick="document.getElementById('shop-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <!-- Overlay do Inventário -->
    <div id="inventory-overlay" class="hidden">
        <h2>🎒 MEU INVENTÁRIO</h2>
        <div class="inventory-container">
            <div class="inv-section">
                <h3>🎒 Itens</h3>
                <div class="inv-grid">
                    <!-- Itens serão carregados aqui -->
                    <div class="inv-empty">Vazio</div>
                </div>
            </div>
        </div>
        <button id="btn-inv-voltar" onclick="document.getElementById('inventory-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
