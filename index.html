<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp - 2D Farming Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Start Menu Overlay -->
        <div id="start-menu">
            <h1 class="main-title">AgriCorp</h1>
            <div class="menu-options">
                <div class="menu-option active" data-action="start">START GAME</div>
                <div class="menu-option" data-action="1player">1 PLAYER</div>
                <div class="menu-option" data-action="2players">2 PLAYERS</div>
                <div class="menu-option" data-action="exit">EXIT</div>
            </div>
        </div>
        
        <!-- Game Canvas and UI -->
        <div id="game-ui" style="display: none;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="ui">
            <h1>AgriCorp</h1>
            <div id="hotbar">
                <div class="slot selected" data-block="1" style="background-color: #8b5a2b;" title="Dirt"></div>
                <div class="slot" data-block="2" style="background-color: #32cd32;" title="Grass"></div>
                <div class="slot" data-block="3" style="background-color: #808080;" title="Stone"></div>
                <div class="slot" data-block="4" style="background-color: #deb887;" title="Wood"></div>
                <div class="slot" data-block="5" style="background-color: #228b22;" title="Leaves"></div>
            </div>
            <div id="controls-help">
                <p>W/A/S/D or Arrows: Move/Jump</p>
                <p>Left Click: Mine Block</p>
                <p>Right Click: Place Block</p>
                <p>1-5: Select Block</p>
            </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
