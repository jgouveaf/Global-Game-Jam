<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HUD: Barra de Comunidade -->
    <div id="hud-top">
        <span id="hud-label">COMUNIDADE</span>
        <div id="hp-bar-bg">
            <div id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hud-value">100</span>
    </div>

    <!-- HUD: Moedas -->
    <div id="hud-coins">
        <span id="hud-coins-label">MOEDAS:</span>
        <span id="hud-coins-value">0</span>
    </div>

    <!-- Botões de Ação (Canto Inferior Direito) -->
    <div id="action-buttons">
        <button id="btn-open-inventory" onclick="document.getElementById('inventory-overlay').classList.remove('hidden')">
            🎒 INVENTÁRIO
        </button>
        <button id="btn-open-shop" onclick="document.getElementById('shop-overlay').classList.remove('hidden')">
            🏪 LOJA
        </button>
    </div>

    <!-- Overlay da Loja -->
    <div id="shop-overlay" class="hidden">
        <h2>🏪 LOJA DA FAZENDA</h2>
        <div class="shop-cards">

            <div class="shop-card">
                <div class="card-icon"><img src="sprites/Pato.png"></div>
                <h3>PATO</h3>
                <p>Produz Ovos (Pouco)</p>
                <div class="card-price">💰 100</div>
                <button class="buy-btn" onclick="buyAnimal('pato', 100)">COMPRAR</button>
            </div>

            <div class="shop-card">
                <div class="card-icon"><img src="sprites/Galinha.png"></div>
                <h3>GALINHA</h3>
                <p>Produz Ovos (Muito)</p>
                <div class="card-price">💰 200</div>
                <button class="buy-btn" onclick="buyAnimal('galinha', 200)">COMPRAR</button>
            </div>

            <div class="shop-card">
                <div class="card-icon"><img src="sprites/Coelho.png"></div>
                <h3>COELHO</h3>
                <p>Produz Carne (Normal)</p>
                <div class="card-price">💰 150</div>
                <button class="buy-btn" onclick="buyAnimal('coelho', 150)">COMPRAR</button>
            </div>

            <div class="shop-card">
                <div class="card-icon"><img src="sprites/Ovelha.png"></div>
                <h3>OVELHA</h3>
                <p>Produz Carne (Muito)</p>
                <div class="card-price">💰 300</div>
                <button class="buy-btn" onclick="buyAnimal('ovelha', 300)">COMPRAR</button>
            </div>



        </div>
        <button id="btn-shop-voltar" onclick="document.getElementById('shop-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <!-- Overlay do Inventário -->
    <div id="inventory-overlay" class="hidden">
        <h2>🎒 MEU INVENTÁRIO</h2>
        <div class="inventory-container">
            
            <div class="inv-section">
                <h3>🌱 Sementes</h3>
                <div class="inv-grid">
                    <div class="inv-item">🌻 Girassol x10</div>
                    <div class="inv-item">🌽 Milho x5</div>
                    <div class="inv-item">🌾 Trigo x20</div>
                </div>
            </div>

            <div class="inv-section">
                <h3>🐄 Animais</h3>
                <div id="inv-animals-list" class="inv-grid">
                    <div class="inv-item">Nenhum animal comprado</div>
                </div>
            </div>


        </div>
        <button id="btn-inv-voltar" onclick="document.getElementById('inventory-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
