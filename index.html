<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        .pixel-icon { width: 24px; image-rendering: pixelated; vertical-align: middle; }
        .menu-btn { background: #8b4513; border: 4px solid #fff; border-bottom: 8px solid #5d3a1a; color: #fff; padding: 15px 30px; font-family: 'Press Start 2P'; font-size: 14px; cursor: pointer; margin: 10px; }
        .menu-btn:hover { background: #a0522d; }
        .back-pixel-btn { background: #3498db; border: 4px solid #fff; border-bottom: 6px solid #2980b9; color: #fff; padding: 10px 20px; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; }
        .sell-btn-large { background: #27ae60; border: 4px solid #fff; border-bottom: 8px solid #1e8449; color: #fff; padding: 20px 40px; font-family: 'Press Start 2P'; font-size: 12px; cursor: pointer; margin-top: 20px; transition: 0.1s; }
        .sell-btn-large:active { transform: translateY(4px); border-bottom-width: 4px; }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #325e22; overflow: hidden;">

    <!-- MAIN MENU OVERLAY -->
    <div id="menu-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: url('sprites/Menu.png'); background-size: cover; background-position: center;">
        <h1 style="color: #ffd700; font-family: 'Press Start 2P'; font-size: 32px; text-shadow: 4px 4px #000; margin-bottom: 50px;">AGRICORP</h1>
        <button id="btn-play" class="menu-btn">▶ PLAY</button>
        <button id="btn-exit" class="menu-btn" style="background: #c0392b; border-bottom-color: #7b241c;">✖ EXIT</button>
    </div>

    <!-- HUD (Hidden during menu) -->
    <div id="game-ui" class="hidden">
        <!-- HUD Status -->
        <div id="stats-container" style="position: fixed; top: 80px; left: 20px; z-index: 5000; font-family: 'Press Start 2P'; font-size: 10px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none;">
            <div style="color: #ffd700; margin-bottom: 12px; font-size: 14px;"><img src="sprites/Moeda.png" style="width:24px; vertical-align:middle;"> <span id="hud-coins-value">500</span></div>
            <div style="color: #ffffff; font-size: 11px; opacity: 0.9;">📦 STORAGE: <span id="hud-products-value">0</span></div>
        </div>

        <!-- HUD Community Health -->
        <div id="hud-top" style="position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; gap: 15px; width: 65%; background: rgba(0,0,0,0.8); padding: 12px 25px; border: 4px solid #fff; border-radius: 4px;">
            <span style="color: #fff; font-size: 7px; font-family: 'Press Start 2P';">COMMUNITY NEED</span>
            <div style="flex: 1; height: 18px; background: #000; border: 2px solid #555; position: relative;">
                <div id="hp-bar" style="height: 100%; background: #f1c40f; width: 100%; transition: width 0.3s ease;"></div>
            </div>
            <span id="hud-value" style="color: #fff; font-size: 8px; font-family: 'Press Start 2P';">100</span>
        </div>

        <!-- Action Buttons -->
        <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 7000; display: flex; flex-direction: column; gap: 12px;">
            <button id="btn-open-lots" style="background: #e67e22; border-color: #ffd700; border-bottom: 8px solid #d35400;">🚜 LANDS</button>
            <button id="btn-open-animals" style="background: #3498db; border-color: #fff; border-bottom: 8px solid #2980b9;">🐾 ANIMALS</button>
            <button id="btn-open-inventory" style="background: #8b4513; border-bottom: 8px solid #5d3a1a;">🎒 STORAGE</button>
        </div>
    </div>

    <!-- Storage Overlay -->
    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; color: #fff; padding: 50px; font-family: 'Press Start 2P'; text-align: center;">
        <h2 style="color: #ffd700; margin-bottom: 30px;">🏠 WAREHOUSE</h2>
        <div style="display: flex; gap: 30px; justify-content: center; background: rgba(0,0,0,0.6); padding: 30px; border: 4px solid #b8860b; max-width: 800px; margin: 0 auto;">
            <div class="inv-section" style="width: 100%;">
                <h3 style="font-size: 14px; color: #ffd700; border-bottom: 2px solid #555; padding-bottom: 10px; margin-bottom: 20px;">STOCK</h3>
                <div id="inv-crops-list" style="font-size: 12px; text-align: left; line-height: 2.5; margin-bottom: 20px;"></div>
                <button id="btn-sell-manual" class="sell-btn-large">💰 SELL ALL PRODUCE</button>
            </div>
        </div>
        <button id="btn-inv-voltar" class="back-pixel-btn" style="margin-top:40px;">← BACK TO FARM</button>
    </div>

    <!-- Animal Shop Overlay -->
    <div id="animal-shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; color: #fff; padding: 40px; font-family: 'Press Start 2P'; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px;">
            <h2 style="color: #ffd700;">🐾 ANIMAL MARKET</h2>
            <button onclick="document.getElementById('animal-shop-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="animals-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto;"></div>
    </div>

    <!-- Lands Shop Overlay -->
    <div id="lots-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; color: #fff; padding: 50px; overflow-y: auto; font-family: 'Press Start 2P';">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px;">
            <h2 style="color: #ffd700;">🚜 EXPAND LAND</h2>
            <button onclick="document.getElementById('lots-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="lots-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto;"></div>
    </div>

    <!-- Game Over -->
    <div id="game-over-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #200000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Press Start 2P';">
        <h1 style="color: #f00; font-size: 32px; margin-bottom: 20px;">GAME OVER</h1>
        <p style="font-size: 12px; margin-bottom: 50px; color: #aaa;">"Não dá para agradar à todos"</p>
        <button onclick="location.reload()" class="back-pixel-btn" style="padding:20px 40px;">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>

</body>
</html>
