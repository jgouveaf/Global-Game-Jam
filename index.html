<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HUD: Barra de Comunidade no topo -->
    <div id="hud">
        <span id="hud-label">COMUNIDADE</span>
        <div id="hp-bar-bg">
            <div id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hud-value">100</span>

        <!-- Separador -->
        <div id="hud-sep"></div>

        <!-- Moedas -->
        <div id="hud-coins">
            <canvas id="coin-icon" width="40" height="40"></canvas>
            <span id="hud-coins-label">MOEDAS:</span>
            <span id="hud-coins-value">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
