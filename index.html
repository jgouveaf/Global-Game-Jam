<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #000; overflow: hidden;">

    <!-- HUD Superior (Barra Vermelha) -->
    <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 3px solid #fff; width: 70%;">
        <span style="color: #fff; font-size: 10px; font-family: 'Press Start 2P', cursive;">COMUNIDADE</span>
        <div style="flex: 1; height: 18px; background: #333; border: 2px solid #555; position: relative;">
            <div id="hp-bar" style="height: 100%; background: #f00 !important; width: 100%;"></div>
        </div>
        <span id="hud-value" style="color: #fff; font-size: 10px; font-family: 'Press Start 2P', cursive;">100</span>
    </div>

    <!-- MOEDAS -->
    <div id="hud-coins" style="position: fixed; top: 70px; left: 20px; z-index: 5000; background: rgba(0,0,0,0.8); color: #ffd700; border: 2px solid #ffd700; padding: 5px 15px; font-family: 'Press Start 2P'; font-size: 8px;">
        💰 MOEDAS: <span id="hud-coins-value">0</span>
    </div>

    <!-- INVENTÁRIO (HOTBAR DE 10 SLOTS) -->
    <div id="hotbar-container" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px; border: 3px solid #fff;">
        <div class="hotbar-slot active" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #ffd700; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #ffd700;">1</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">2</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">3</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">4</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">5</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">6</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">7</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">8</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">9</span></div>
        <div class="hotbar-slot" style="width: 48px; height: 48px; background: #4a4a6e; border: 3px solid #000; position: relative;"><span style="position: absolute; top: 2px; left: 4px; font-size: 8px; color: #fff;">0</span></div>
    </div>

    <!-- TIMER DE PLANTIO -->
    <div id="planting-timer" class="hidden">
        PREPARE-SE: <span id="timer-sec">10</span>s PARA PLANTAR!
    </div>

    <!-- Botões de Ação -->
    <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 6000; display: flex; flex-direction: column; gap: 10px;">
        <button id="btn-water">💧 REGAR</button>
        <button id="btn-open-inventory" onclick="document.getElementById('inventory-overlay').classList.remove('hidden')">🎒 INVENTÁRIO</button>
        <button id="btn-open-shop" onclick="document.getElementById('shop-overlay').classList.remove('hidden')">🏪 LOJA</button>
    </div>

    <!-- Overlays -->
    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 7000; color: #fff; padding: 50px; font-family: 'Press Start 2P';">
        <h2>🎒 MEU INVENTÁRIO</h2>
        <button onclick="document.getElementById('inventory-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <div id="shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 7000; color: #fff; padding: 50px; font-family: 'Press Start 2P';">
        <h2>🏪 LOJA DA VILA</h2>
        <button onclick="document.getElementById('shop-overlay').classList.add('hidden')">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
