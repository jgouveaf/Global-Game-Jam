<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #325e22; overflow: hidden;">

    <!-- HUD de Status (Moedas e Sementes) -->
    <div id="stats-container" style="position: fixed; top: 70px; left: 20px; z-index: 5000; font-family: 'Press Start 2P'; font-size: 10px; color: #fff; text-shadow: 2px 2px #000;">
        <div style="color: #ffd700; margin-bottom: 5px;">💰 MOEDAS: <span id="hud-coins-value">100</span></div>
        <div style="color: #0f0;">🌱 SEMENTES: <span id="hud-seeds-value">10</span></div>
    </div>

    <!-- HUD de Comunidade -->
    <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; gap: 10px; width: 80%;">
        <span style="color: #fff; text-shadow: 2px 2px #000; font-size: 8px; font-family: 'Press Start 2P';">COMUNIDADE</span>
        <div style="flex: 1; height: 16px; background: rgba(0,0,0,0.5); border: 2px solid #fff; position: relative;">
            <div id="hp-bar" style="height: 100%; background: #f00; width: 100%;"></div>
        </div>
        <span id="hud-value" style="color: #fff; font-size: 8px; font-family: 'Press Start 2P';">100</span>
    </div>

    <!-- MENSAGEM DE PLANTIO -->
    <div id="planting-timer" class="hidden" style="position: fixed; top: 100px; left: 50%; transform: translateX(-50%); color: #fff; text-shadow: 2px 2px #000; font-size: 12px; z-index: 6000; font-family: 'Press Start 2P';">
        PLANTARE: <span id="timer-sec">10</span>s
    </div>

    <!-- BOTÕES DE AÇÃO (No canto direito, estilo original) -->
    <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 7000; display: flex; flex-direction: column; gap: 10px;">
        <button id="btn-water" style="padding: 12px; background: #8b4513; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer;">💧 REGAR</button>
        <button id="btn-open-inventory" onclick="document.getElementById('inventory-overlay').classList.remove('hidden')" style="padding: 12px; background: #8b4513; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer;">🎒 INVENTÁRIO</button>
        <button id="btn-open-shop" style="padding: 12px; background: #8b4513; color: #fff; border: 3px solid #fff; font-family: 'Press Start 2P'; font-size: 8px; cursor: pointer;">🏪 LOJA</button>
    </div>

    <!-- OVERLAYS -->
    <div id="shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P';">
        <h2 style="margin-bottom: 20px; color: #ffd700;">🏪 LOJA DA FAZENDA</h2>
        <div style="background: #3e2723; border: 5px solid #fff; padding: 40px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">🌱</div>
            <h3>SEMENTE DE TRIGO</h3>
            <p style="font-size: 8px; color: #ccc; margin: 10px 0;">Necessária para plantar</p>
            <div style="color: #ffd700; margin-bottom: 20px;">💰 10 CADA</div>
            <button id="btn-buy-seed" style="background: #27ae60; color: white; border: 3px solid #fff; padding: 10px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 8px;">COMPRAR (1)</button>
        </div>
        <button id="btn-close-shop" style="margin-top: 30px; background: #c0392b; color: white; border: 3px solid #fff; padding: 15px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 8px;">← VOLTAR</button>
    </div>

    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P';">
        <h2>🎒 INVENTÁRIO</h2>
        <p>Vazio por enquanto...</p>
        <button onclick="document.getElementById('inventory-overlay').classList.add('hidden')" style="margin-top: 30px; background: #c0392b; color: #fff; border: 3px solid #fff; padding: 10px; cursor: pointer;">Pressione ESC ou clique para sair</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
