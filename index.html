<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp - Opening</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="splash-container">
        <!-- Parte 1: Produtora (Igual à imagem) -->
        <div id="production-intro" class="intro-screen">
            <span class="intro-text small">A</span>
            <h1 class="intro-text logo">G O D F R A M E</h1>
            <span class="intro-text small production">P R O D U C T I O N</span>
        </div>

        <!-- Parte 2: Nome do Jogo -->
        <div id="game-title" class="intro-screen hidden">
            <h1 class="game-logo">AgriCorp</h1>
        </div>

        <!-- Parte 3: Menu Principal (NOVO) -->
        <div id="main-menu" class="intro-screen hidden">
            <div class="menu-container">
                <button class="menu-btn" id="start-btn">I N I C I A R</button>
                <button class="menu-btn" id="settings-btn">C O N F I G U R A Ç Õ E S</button>
                <button class="menu-btn" id="exit-btn">S A I R</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
