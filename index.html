<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazendeiro Comunitário | Cultivando Juntos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- HUD -->
        <header class="hud">
            <div class="stats-card">
                <span class="stat-label">MOEDAS</span>
                <span id="coins" class="stat-value">50</span>
            </div>
            <div class="stats-card">
                <span class="stat-label">FELICIDADE</span>
                <div class="progress-bar-container">
                    <div id="happiness-bar" class="progress-bar"></div>
                    <span id="happiness-text">0%</span>
                </div>
            </div>
            <div class="inventory-card">
                <div class="crop-inventory" id="inventory-list">
                    <!-- Itens -->
                </div>
            </div>
        </header>

        <main class="game-view">
            <!-- Fazenda -->
            <section id="farm-section" class="scene-section">
                <h2 class="section-title">SUA FAZENDA</h2>
                <div class="farm-grid" id="farm-grid">
                    <!-- Grade 3x3 -->
                </div>
            </section>

            <!-- Comunidade -->
            <section id="community-section" class="scene-section">
                <h2 class="section-title">VILA</h2>
                <div class="requests-container" id="requests-list">
                    <!-- Pedidos -->
                </div>
            </section>
        </main>

        <!-- Sementes -->
        <footer class="shop-footer">
            <div class="seed-selector" id="seed-shop"></div>
        </footer>
    </div>

    <div id="notification-area"></div>
    <script src="main.js"></script>
</body>
</html>
