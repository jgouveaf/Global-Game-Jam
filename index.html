<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HUD: Barra de Comunidade -->
    <div id="hud-top">
        <span id="hud-label">COMUNIDADE</span>
        <div id="hp-bar-bg">
            <div id="hp-bar" style="width: 100%;"></div>
        </div>
        <span id="hud-value">100</span>
    </div>

    <!-- HUD: Moedas -->
    <div id="hud-coins">
        <span id="hud-coins-label">MOEDAS:</span>
        <span id="hud-coins-value">0</span>
    </div>

    <!-- Botão Loja (canto inferior direito) -->
    <button id="btn-open-shop" onclick="document.getElementById('shop-overlay').classList.remove('hidden')">
        🏪 LOJA
    </button>

    <!-- Overlay da Loja -->
    <div id="shop-overlay" class="hidden">
        <h2>🏪 LOJA DA FAZENDA</h2>
        <div class="shop-cards">

            <div class="shop-card">
                <div class="card-icon">🐖</div>
                <h3>NOVOS<br>ANIMAIS</h3>
                <p>Adicione porcos,<br>galinhas e ovelhas</p>
                <div class="stars">★★☆☆☆☆</div>
                <div class="card-level">Nível 2 / 6</div>
                <button class="buy-btn">COMPRAR</button>
            </div>

            <div class="shop-card">
                <div class="card-icon">🌱</div>
                <h3>NOVAS<br>PLANTAS</h3>
                <p>Desbloqueie novas<br>culturas para plantar</p>
                <div class="stars">★★★★☆☆</div>
                <div class="card-level">Nível 4 / 6</div>
                <button class="buy-btn">COMPRAR</button>
            </div>

            <div class="shop-card card-highlight">
                <div class="card-icon">⚡</div>
                <h3>VELOCIDADE<br>DE PLANTAÇÃO</h3>
                <p>Plante mais rápido<br>e colha mais cedo</p>
                <div class="stars">☆☆☆☆☆☆</div>
                <div class="card-level">Nível 0 / 6</div>
                <button class="buy-btn">COMPRAR</button>
            </div>

        </div>
        <button id="btn-shop-voltar" onclick="document.getElementById('shop-overlay').classList.add('hidden'); ">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>
</body>
</html>
