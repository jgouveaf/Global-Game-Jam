<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css?v=fresh">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { font-size: 8px !important; }
        .pixel-icon { width: 16px; image-rendering: pixelated; vertical-align: middle; }
        .menu-btn { background: #8b4513; border: 4px solid #fff; border-bottom: 6px solid #5d3a1a; color: #fff; padding: 14px 28px; font-family: 'Press Start 2P'; cursor: pointer; margin: 15px; font-size: 10px !important; }
        .back-pixel-btn { background: #3498db; border: 3px solid #fff; border-bottom: 5px solid #2980b9; color: #fff; padding: 12px 24px; font-family: 'Press Start 2P'; cursor: pointer; }
        .sell-btn-large { background: #27ae60; border: 4px solid #fff; border-bottom: 6px solid #1e8449; color: #fff; padding: 18px 36px; font-family: 'Press Start 2P'; cursor: pointer; margin-top: 40px; }
        .action-btns-container { display: flex; flex-direction: column; gap: 20px; position: fixed; bottom: 30px; right: 30px; z-index: 7000; }
        .action-btns-container button { padding: 14px 22px; font-family: 'Press Start 2P'; color: #fff; border: 3px solid #fff; cursor: pointer; border-bottom-width: 6px; }
        .shop-card { background: rgba(0,0,0,0.9); border: 3px solid #ffd700; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .buy-btn { font-family: 'Press Start 2P'; font-size: 8px !important; padding: 8px; color: #fff; border: 2px solid #fff; cursor: pointer; border-bottom-width: 4px; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #000; overflow: hidden;">

    <!-- MAIN MENU -->
    <div id="menu-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: url('menu_bg.png'); background-size: cover; background-position: center; border: 5px solid #333;">
        <h1 style="font-size: 32px !important; color: #ffd700; margin-bottom: 30px; text-shadow: 4px 4px #000; font-family: 'Press Start 2P';">AGRICORP</h1>
        <div style="display:flex; flex-direction:column; align-items:center;">
            <button id="btn-play" class="menu-btn">▶ START MISSION</button>
            <button id="btn-exit" class="menu-btn" style="background: #c0392b; border-bottom-color: #7b241c;">✖ EXIT</button>
        </div>
    </div>

    <!-- UI -->
    <div id="game-ui" class="hidden">
        <div id="stats-container" style="position: fixed; top: 70px; left: 30px; z-index: 5000; font-family: 'Press Start 2P'; color: #fff; text-shadow: 3px 3px #000; pointer-events: none;">
            <div style="color: #ffd700; margin-bottom: 15px; font-size: 12px !important; background: rgba(0,0,0,0.5); padding: 10px;"><img src="sprites/Moeda.png" style="width:20px;"> <span id="hud-coins-value">500</span></div>
            <div style="color: #ffffff; opacity: 0.9; background: rgba(0,0,0,0.5); padding: 10px;">📦 STOCK: <span id="hud-products-value">0</span></div>
        </div>
        <div id="hud-top" style="position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; width: 60%; background: rgba(0,0,0,0.85); padding: 12px 25px; border: 3px solid #fff;">
            <span style="color: #fff; font-family: 'Press Start 2P';">NEED</span>
            <div style="flex: 1; height: 16px; background: #000; border: 2px solid #555; position: relative; margin: 0 15px;">
                <div id="hp-bar" style="height: 100%; background: #f1c40f; width: 100%; transition: width 0.3s ease;"></div>
            </div>
            <span id="hud-value" style="color: #fff; font-family: 'Press Start 2P';">100</span>
        </div>
        <div class="action-btns-container">
            <button id="btn-open-lots" style="background: #e67e22; border-color: #ffd700;">🏚 LANDS</button>
            <button id="btn-open-animals" style="background: #3498db; border-color: #fff;">🐾 ANIMALS</button>
            <button id="btn-open-inventory" style="background: #8b4513;">🎒 STORAGE</button>
            <button id="btn-open-tutorial" style="background: #444; border-color: #888;">❤ HELP</button>
        </div>
    </div>

    <!-- Shop Overlays -->
    <div id="lots-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 10000; color: #fff; padding: 60px; overflow-y: auto; font-family: 'Press Start 2P';">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width:1000px; margin: 0 auto 40px;">
            <h2 style="color: #ffd700; font-size: 18px !important;">🏚 LAND EXPANSION</h2>
            <button onclick="document.getElementById('lots-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="lots-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto;"></div>
    </div>

    <div id="animal-shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 10000; color: #fff; padding: 60px; font-family: 'Press Start 2P'; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width:1000px; margin: 0 auto 40px;">
            <h2 style="color: #ffd700; font-size: 18px !important;">🐾 ANIMAL MARKET</h2>
            <button onclick="document.getElementById('animal-shop-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="animals-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto;"></div>
    </div>

    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P'; text-align: center;">
        <h2 style="color: #ffd700; margin-bottom: 50px; font-size: 20px !important;">🎒 WAREHOUSE</h2>
        <div id="inv-crops-list" style="line-height: 3.5; display: flex; flex-direction: column; align-items: center; font-size: 14px !important; margin-bottom: 20px;"></div>
        <button id="btn-sell-manual" class="sell-btn-large">💰 SELL ALL PRODUCE</button>
        <button id="btn-inv-voltar" class="back-pixel-btn" style="margin-top: 35px;">BACK</button>
    </div>

    <div id="tutorial-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 35000; display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P'; color: #fff; padding: 20px;">
        <div style="max-width: 500px; border: 4px solid #ffd700; background: #1a1a1a; padding: 50px; text-align: left;">
            <h2 style="color: #ffd700; margin-bottom: 30px; font-size: 16px !important;">HOW TO PLAY</h2>
            <div style="line-height: 2.8; font-size: 10px !important;">
                <p>1. Buy lands to produce crops.</p>
                <p>2. Buy animals for resources.</p>
                <p>3. Go to STORAGE and SELL often to keep community happy.</p>
                <p style="color: #f00; font-weight: bold; margin-top: 20px;">4. SURVIVE!</p>
            </div>
            <button id="btn-close-tut" class="back-pixel-btn" style="margin-top:40px; width: 100%;">LET'S GO!</button>
        </div>
    </div>

    <div id="game-over-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #200000; z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Press Start 2P';">
        <h1 style="color: #f00; font-size: 32px !important; margin-bottom: 10px;">GAME OVER</h1>
        <button onclick="location.reload()" class="back-pixel-btn">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <!-- CARREGANDO O ARQUIVO NOVO PARA MATAR O CACHE -->
    <script src="main.js?v=fresh2"></script>

</body>
</html>
