<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp - 2D Farming Sandbox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Splash Screen Overlay -->
        <div id="splash-screen">
            <h1 class="splash-logo">GodFrame<br><span>Studios</span></h1>
        </div>

        <!-- Start Menu Overlay -->
        <div id="start-menu">
            <h1 class="main-title">AgriCorp</h1>
            <div class="menu-options">
                <div class="menu-option active" data-action="play">PLAY</div>
                <div class="menu-option" data-action="settings">SETTINGS</div>
                <div class="menu-option" data-action="quit">QUIT</div>
            </div>
        </div>
        
        <!-- Game Canvas and UI -->
        <div id="game-ui" style="display: none;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div id="ui">
            <h1>AgriCorp</h1>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
