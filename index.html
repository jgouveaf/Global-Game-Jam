<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { font-size: 8px !important; }
        .pixel-icon { width: 16px; image-rendering: pixelated; vertical-align: middle; }
        
        /* BOTÕES MAIS SEPARADOS E ESTILIZADOS */
        .menu-btn { background: #8b4513; border: 4px solid #fff; border-bottom: 6px solid #5d3a1a; color: #fff; padding: 12px 24px; font-family: 'Press Start 2P'; cursor: pointer; margin: 25px; font-size: 10px !important; transition: transform 0.1s; }
        .menu-btn:active { transform: translateY(3px); }
        
        .back-pixel-btn { background: #3498db; border: 3px solid #fff; border-bottom: 5px solid #2980b9; color: #fff; padding: 10px 20px; font-family: 'Press Start 2P'; cursor: pointer; }
        .sell-btn-large { background: #27ae60; border: 4px solid #fff; border-bottom: 6px solid #1e8449; color: #fff; padding: 15px 30px; font-family: 'Press Start 2P'; cursor: pointer; margin-top: 30px; }
        
        #hud-top { height: 14px; background: rgba(0,0,0,0.85); padding: 10px 20px; border: 3px solid #fff; gap: 15px; }
        .action-btns-container { display: flex; flex-direction: column; gap: 15px; position: fixed; bottom: 20px; right: 20px; z-index: 7000; }
        .action-btns-container button { padding: 12px 18px; font-family: 'Press Start 2P'; color: #fff; border: 2px solid #fff; cursor: pointer; border-bottom-width: 6px; }

        .shop-card { background: rgba(0,0,0,0.85); border: 2px solid #fff; padding: 15px; text-align: center; }
        .buy-btn { font-family: 'Press Start 2P'; font-size: 7px !important; padding: 6px; color: #fff; border: 2px solid #fff; cursor: pointer; border-bottom-width: 4px; }
    </style>
</head>
<body style="margin: 0; padding: 0; background: #000; overflow: hidden;">

    <!-- MAIN MENU (Destaque para o arquivo menu_bg.png) -->
    <div id="menu-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: url('menu_bg.png'); background-size: cover; background-position: center;">
        <div style="margin-top: 40px; display:flex; flex-direction:column; align-items:center;">
            <button id="btn-play" class="menu-btn">▶ START MISSION</button>
            <button id="btn-exit" class="menu-btn" style="background: #c0392b; border-bottom-color: #7b241c;">✖ EXIT</button>
        </div>
    </div>

    <!-- UI -->
    <div id="game-ui" class="hidden">
        <div id="stats-container" style="position: fixed; top: 60px; left: 20px; z-index: 5000; font-family: 'Press Start 2P'; color: #fff; text-shadow: 2px 2px #000; pointer-events: none;">
            <div style="color: #ffd700; margin-bottom: 12px; font-size: 10px !important;"><img src="sprites/Moeda.png" style="width:16px;"> <span id="hud-coins-value">500</span></div>
            <div style="color: #ffffff; opacity: 0.9;">📦 STOCK: <span id="hud-products-value">0</span></div>
        </div>
        <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; width: 50%;">
            <span style="color: #fff; font-family: 'Press Start 2P';">NEED</span>
            <div style="flex: 1; height: 12px; background: #000; border: 1px solid #555; position: relative; margin: 0 10px;">
                <div id="hp-bar" style="height: 100%; background: #f1c40f; width: 100%; transition: width 0.3s ease;"></div>
            </div>
            <span id="hud-value" style="color: #fff; font-family: 'Press Start 2P';">100</span>
        </div>
        <div class="action-btns-container">
            <button id="btn-open-lots" style="background: #e67e22; border-color: #ffd700; border-bottom-color: #d35400;">🚜 LANDS</button>
            <button id="btn-open-animals" style="background: #3498db; border-color: #fff; border-bottom-color: #2980b9;">🐾 ANIMALS</button>
            <button id="btn-open-inventory" style="background: #8b4513; border-bottom-color: #5d3a1a;">🎒 STORAGE</button>
            <button id="btn-open-tutorial" style="background: #444; border-color: #888; border-bottom-color: #222;">❓ HELP</button>
        </div>
    </div>

    <!-- Lands Overlay -->
    <div id="lots-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; color: #fff; padding: 50px; overflow-y: auto; font-family: 'Press Start 2P';">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width:900px; margin: 0 auto 30px;">
            <h2 style="color: #ffd700; font-size: 14px !important;">🚜 LAND EXPANSION</h2>
            <button onclick="document.getElementById('lots-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="lots-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto;"></div>
    </div>

    <!-- Animals Overlay -->
    <div id="animal-shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; color: #fff; padding: 40px; font-family: 'Press Start 2P'; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width:900px; margin: 0 auto 40px;">
            <h2 style="color: #ffd700; font-size: 14px !important;">🐾 ANIMAL MARKET</h2>
            <button onclick="document.getElementById('animal-shop-overlay').classList.add('hidden')" class="back-pixel-btn">BACK</button>
        </div>
        <div id="animals-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto;"></div>
    </div>

    <!-- STORAGE (CENTRALIZADO) -->
    <div id="inventory-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 10000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P'; text-align: center;">
        <h2 style="color: #ffd700; margin-bottom: 40px; font-size: 16px !important;">🎒 WAREHOUSE</h2>
        <div id="inv-crops-list" style="line-height: 2.5; display: flex; flex-direction: column; align-items: center; font-size: 10px !important;"></div>
        <button id="btn-sell-manual" class="sell-btn-large">💰 SELL ALL PRODUCE</button>
        <button id="btn-inv-voltar" class="back-pixel-btn" style="margin-top: 25px;">BACK</button>
    </div>

    <!-- HELP (ESPAÇADO) -->
    <div id="tutorial-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 35000; display: flex; align-items: center; justify-content: center; font-family: 'Press Start 2P'; color: #fff; padding: 20px;">
        <div style="max-width: 450px; border: 3px solid #ffd700; background: #1a1a1a; padding: 40px; text-align: left;">
            <h2 style="color: #ffd700; margin-bottom: 25px; font-size: 12px !important;">HOW TO PLAY</h2>
            <div style="line-height: 2.2;">
                <p>1. Buy lands to produce crops.</p>
                <p>2. Buy animals for resources.</p>
                <p>3. Go to STORAGE and SELL often to keep the community happy.</p>
                <p style="color: #f00; font-weight: bold; margin-top: 15px;">4. SURVIVE!</p>
            </div>
            <button id="btn-close-tut" class="back-pixel-btn" style="margin-top:35px; width: 100%;">LET'S GO!</button>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #200000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Press Start 2P';">
        <h1 style="color: #f00; font-size: 24px !important;">GAME OVER</h1>
        <p style="margin-bottom: 40px; color: #aaa; font-size: 8px !important;">"You can't please everyone"</p>
        <button onclick="location.reload()" class="back-pixel-btn" style="padding: 15px 30px;">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="main.js"></script>

</body>
</html>
