<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCorp – Global Game Jam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; background: #325e22; overflow: hidden;">

    <!-- HUD Superior -->
    <div id="hud-top" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; align-items: center; gap: 10px; padding: 10px; width: 80%;">
        <span style="color: #fff; text-shadow: 2px 2px #000; font-size: 10px; font-family: 'Press Start 2P', cursive;">COMUNIDADE</span>
        <div style="flex: 1; height: 16px; background: rgba(0,0,0,0.5); border: 3px solid #fff; position: relative;">
            <div id="hp-bar" style="height: 100%; background: #f00; width: 100%;"></div>
        </div>
        <span id="hud-value" style="color: #fff; text-shadow: 2px 2px #000; font-size: 10px;">100</span>
    </div>

    <!-- MOEDAS E SEMENTES -->
    <div id="stats-container" style="position: fixed; top: 70px; left: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 10px; font-family: 'Press Start 2P'; font-size: 8px; color: #fff; text-shadow: 2px 2px #000;">
        <div>💰 MOEDAS: <span id="hud-coins-value">100</span></div>
        <div style="color: #0f0;">🌱 SEMENTES: <span id="hud-seeds-value">0</span></div>
    </div>

    <!-- TIMER DE PLANTIO -->
    <div id="planting-timer" class="hidden" style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%); color: #fff; text-shadow: 2px 2px #000; font-size: 12px; z-index: 6000;">
        VAI! PLANTE TRIGO (<span id="timer-sec">10</span>s)
    </div>

    <!-- Botões de Ação -->
    <div id="action-buttons" style="position: fixed; bottom: 20px; right: 20px; z-index: 6000; display: flex; flex-direction: column; gap: 10px;">
        <button id="btn-water" style="padding: 15px; cursor: pointer;">💧 REGAR TERRENO</button>
        <button onclick="document.getElementById('shop-overlay').classList.remove('hidden')" style="padding: 10px; cursor: pointer;">🏪 LOJA DA FAZENDA</button>
    </div>

    <!-- OVERLAY DA LOJA -->
    <div id="shop-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 7000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Press Start 2P';">
        <h2 style="margin-bottom: 30px; color: #ffd700;">🏪 LOJA DA FAZENDA</h2>
        <div style="background: #3c3c5e; border: 5px solid #fff; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 300px;">
            <div style="font-size: 40px;">🌱</div>
            <h3>SEMENTE DE TRIGO</h3>
            <p style="font-size: 8px; color: #ccc;">Necessária para plantar</p>
            <div style="color: #ffd700; font-size: 12px;">💰 10 CADA</div>
            <button id="btn-buy-seed" style="background: #27ae60; color: #fff; padding: 10px; width: 100%; border: 3px solid #fff; cursor: pointer;">COMPRAR (1)</button>
        </div>
        <button onclick="document.getElementById('shop-overlay').classList.add('hidden')" style="margin-top: 30px; background: #c0392b; color: #fff; padding: 10px; border: 3px solid #fff; cursor: pointer;">← VOLTAR</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
